<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <rect width="120" height="120" fill="white"/>

  <!-- Cube base -->
  <polygon points="60,15 100,40 60,65 20,40"
           fill="#FF6B00"/>

  <!-- Left face -->
  <polygon points="20,40 60,65 60,105 20,80"
           fill="#111111"/>

  <!-- Right face -->
  <polygon points="100,40 60,65 60,105 100,80"
           fill="#FF8C33"/>

  <!-- Inner cube highlight -->
  <polygon points="60,35 80,47 60,60 40,47"
           fill="white"/>
</svg>